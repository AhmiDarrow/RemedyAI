name: Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.10.0 or v0.10.0). Required for manual runs.'
        required: true
        type: string

env:
  APP_NAME: Remedy Desktop
  REPO_OWNER: AhmiDarrow
  REPO_NAME: RemedyAI

jobs:
  build-sidecar:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --dev

      - name: Build sidecar
        run: python scripts/build_desktop.py --clean --ci

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: remedy-sidecar
          path: desktop/bin/remedy-desktop*.exe
          retention-days: 1

  build-tauri:
    needs: build-sidecar
    runs-on: windows-latest
    outputs:
      installer_name: ${{ steps.extract.outputs.installer_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: remedy-sidecar
          path: desktop/bin/

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install frontend deps
        run: npm ci
        working-directory: desktop

      - name: Build Tauri
        run: npx tauri build --bundles nsis
        working-directory: desktop
        env:
          # Optional: set these GitHub secrets to produce signed updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Find installer
        id: extract
        shell: bash
        run: |
          INSTALLER=$(ls desktop/src-tauri/target/release/bundle/nsis/*.exe | head -1)
          echo "installer_path=${INSTALLER}" >> $GITHUB_OUTPUT
          echo "installer_name=$(basename "${INSTALLER}")" >> $GITHUB_OUTPUT
          # Tauri also emits a .sig next to the installer when signing is configured.
          SIG="${INSTALLER}.sig"
          if [[ -f "$SIG" ]]; then
            echo "signature_path=${SIG}" >> $GITHUB_OUTPUT
          else
            echo "signature_path=" >> $GITHUB_OUTPUT
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: remedy-installer
          path: ${{ steps.extract.outputs.installer_path }}
          retention-days: 7

      - name: Upload signature artifact (optional)
        if: steps.extract.outputs.signature_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: remedy-installer-sig
          path: ${{ steps.extract.outputs.signature_path }}
          retention-days: 7

  release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT="${{ inputs.version }}"
          if [[ -n "${INPUT}" ]]; then
            VER="${INPUT#v}"
            TAG="v${VER}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
          else
            echo "::error::Manual workflow_dispatch requires a version input (e.g. 0.10.0). Tag pushes use the tag name."
            exit 1
          fi
          if [[ ! "${VER}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "::error::Invalid version '${VER}'. Expected semver like 0.10.0 (got tag/ref that is not a version)."
            exit 1
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: remedy-installer
          path: dist/

      - name: Download signature (optional)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: remedy-installer-sig
          path: dist/

      - name: Get installer filename and signature
        id: installer
        shell: bash
        run: |
          set -euo pipefail
          INSTALLER=$(ls dist/*.exe | head -1)
          echo "name=$(basename "${INSTALLER}")" >> $GITHUB_OUTPUT
          SIG=""
          if compgen -G "dist/*.sig" > /dev/null; then
            SIG=$(cat dist/*.sig | tr -d '\r\n' | head -c 100000)
          fi
          printf '%s' "${SIG}" > dist/signature.txt
          if [[ -z "${SIG}" ]]; then
            echo "::warning::No update signature found. Auto-update will not work until TAURI_SIGNING_PRIVATE_KEY is configured and plugins.updater.pubkey is set in tauri.conf.json."
          fi

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          SIG=$(cat dist/signature.txt)
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          ver = os.environ["VER"]
          tag = os.environ["TAG"]
          name = os.environ["INSTALLER_NAME"]
          sig = open("dist/signature.txt", encoding="utf-8").read()
          owner = os.environ["REPO_OWNER"]
          repo = os.environ["REPO_NAME"]
          payload = {
              "version": f"v{ver}",
              "notes": f"Remedy Desktop v{ver}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": {
                  "windows-x86_64": {
                      "signature": sig,
                      "url": f"https://github.com/{owner}/{repo}/releases/download/{tag}/{name}",
                  }
              },
          }
          with open("dist/latest.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
              f.write("\n")
          print("Wrote dist/latest.json")
          PY
        env:
          VER: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          INSTALLER_NAME: ${{ steps.installer.outputs.name }}
          REPO_OWNER: ${{ env.REPO_OWNER }}
          REPO_NAME: ${{ env.REPO_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Remedy Desktop v${{ steps.version.outputs.version }}
          body: |
            ## Remedy Desktop v${{ steps.version.outputs.version }}

            Download the installer below to install Remedy Desktop on Windows.

            ### Installation
            1. Download the `.exe` installer
            2. Run it — Remedy Desktop will install automatically
            3. Launch from the Start Menu or desktop shortcut

            No Python, Node, or Rust required.

            ### Auto-update
            In-app auto-update requires a signed release (`TAURI_SIGNING_PRIVATE_KEY` secret + `plugins.updater.pubkey` in `tauri.conf.json`). Unsigned `latest.json` entries will not install securely via the updater.
          files: |
            dist/${{ steps.installer.outputs.name }}
            dist/latest.json
          generate_release_notes: true
