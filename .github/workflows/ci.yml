name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type-check (core helpers)
        run: uv run mypy

      - name: Import smoke
        run: uv run python -c "import remedy; from remedy.interfaces.api import create_app; create_app(); print('import OK')"

      - name: Test
        run: uv run pytest -q --tb=short
