[[permission]]
identifier = "allow-window-chrome"
description = "Custom title bar: minimize, maximize, close/hide-to-tray, show."
commands.allow = [
  "show_main_window",
  "minimize_main_window",
  "toggle_maximize_main_window",
  "request_close_main_window",
  "set_desktop_prefs",
  "get_desktop_prefs",
]
